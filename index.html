<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>同行報價系統</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/js/all.min.js" defer></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@600;700&display=swap');

  :root {
    --accent: #00f5c4;
    --accent-dim: #00c49a;
    --warn: #ff8c42;
    --surface: #111318;
    --surface-2: #1a1d25;
    --surface-3: #222630;
    --border: #2e3340;
    --text-1: #e8eaf0;
    --text-2: #8890a4;
  }

  * { box-sizing: border-box; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--surface);
    color: var(--text-1);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .mono { font-family: 'JetBrains Mono', monospace; }

  /* Header */
  .header-bar {
    background: var(--surface-2);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Select styling */
  .select-wrap {
    position: relative;
  }
  .select-wrap::after {
    content: '▾';
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--accent);
    pointer-events: none;
    font-size: 14px;
  }
  select {
    width: 100%;
    appearance: none;
    background: var(--surface-3);
    border: 1.5px solid var(--border);
    color: var(--text-1);
    border-radius: 10px;
    padding: 14px 44px 14px 16px;
    font-size: 15px;
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }
  select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0, 245, 196, 0.12);
  }
  select option {
    background: var(--surface-3);
    color: var(--text-1);
  }

  /* Label */
  .field-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-2);
    margin-bottom: 6px;
  }

  /* Result card */
  .result-card {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-header {
    background: var(--surface-3);
    padding: 14px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }

  .repair-name {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-1);
  }

  .model-badge {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    padding: 3px 9px;
    background: rgba(0,245,196,0.1);
    color: var(--accent);
    border-radius: 20px;
    border: 1px solid rgba(0,245,196,0.25);
  }

  /* Price grid */
  .price-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
  }

  .price-cell {
    padding: 18px 14px;
    text-align: center;
    border-right: 1px solid var(--border);
    position: relative;
  }
  .price-cell:last-child { border-right: none; }

  .price-type {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--text-2);
    margin-bottom: 8px;
  }
  .price-cell:nth-child(2) .price-type { color: var(--warn); }
  .price-cell:nth-child(3) .price-type { color: var(--accent); }

  .price-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    font-weight: 700;
    line-height: 1;
  }
  .price-value.retail { color: var(--text-2); }
  .price-value.member { color: var(--warn); }
  .price-value.trade  { color: var(--accent); }

  .trade-cell {
    background: rgba(0, 245, 196, 0.04);
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--text-2);
  }
  .empty-icon {
    font-size: 40px;
    margin-bottom: 12px;
    opacity: 0.3;
  }

  /* Multi-result table */
  .result-table {
    width: 100%;
    border-collapse: collapse;
    animation: slideUp 0.25s ease;
  }
  .result-table th {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-2);
    padding: 12px 14px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    background: var(--surface-3);
  }
  .result-table th:not(:first-child) { text-align: right; }
  .result-table td {
    padding: 13px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
    vertical-align: middle;
  }
  .result-table tr:last-child td { border-bottom: none; }
  .result-table td:not(:first-child) {
    text-align: right;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
  }
  .result-table td.col-retail { color: var(--text-2); font-size: 13px; }
  .result-table td.col-member { color: var(--warn); }
  .result-table td.col-trade  { color: var(--accent); font-size: 15px; }
  .result-table tr:hover td { background: rgba(255,255,255,0.02); }

  .section-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-2);
    padding: 0 4px;
  }

  /* Divider */
  .divider { border: none; border-top: 1px solid var(--border); }
</style>
</head>
<body>

<!-- Header -->
<div class="header-bar">
  <div class="header-dot"></div>
  <span style="font-size:14px;font-weight:700;letter-spacing:0.04em;">同行報價系統</span>
  <span style="margin-left:auto;font-size:11px;color:var(--text-2);">僅供業者查詢</span>
</div>

<!-- Main -->
<div style="max-width:540px;margin:0 auto;padding:20px 16px 40px;">

  <!-- Selectors -->
  <div style="display:flex;flex-direction:column;gap:14px;margin-bottom:24px;">

    <div>
      <div class="field-label">機型選擇</div>
      <div class="select-wrap">
        <select id="modelSelect" onchange="onSelectionChange()">
          <option value="">── 請選擇機型 ──</option>
        </select>
      </div>
    </div>

    <div>
      <div class="field-label">維修項目</div>
      <div class="select-wrap">
        <select id="repairSelect" onchange="onSelectionChange()">
          <option value="">── 請先選擇機型 ──</option>
        </select>
      </div>
    </div>

  </div>

  <hr class="divider" style="margin-bottom:24px;">

  <!-- Results -->
  <div id="resultArea">
    <div class="empty-state">
      <div class="empty-icon">🔧</div>
      <div style="font-size:14px;font-weight:500;">請選擇機型與維修項目</div>
      <div style="font-size:12px;margin-top:6px;">將顯示詳細報價資訊</div>
    </div>
  </div>

</div>

<script>
// ─────────────────────────────────────────────
// 折數對照表（原價 × 折數 = 顯示價格）
// ─────────────────────────────────────────────
const DISCOUNT = {
  "原廠電池": { member: 0.95, trade: 0.83 },
  "副廠電池": { member: 0.90, trade: 0.65 },
  "原廠螢幕": { member: 0.95, trade: 0.86 },
  "副廠螢幕": { member: 0.95, trade: 0.85 },
};

// ─────────────────────────────────────────────
// Google 試算表 CSV 網址
// ─────────────────────────────────────────────
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSUwnELEbySqOaS4nV5SV40XyoETKBVSCpaU99IS3r0e2WP4DjCPfDcKmD9TTSsoayahipk1hL9Fc2G/pub?gid=0&single=true&output=csv";

// ─────────────────────────────────────────────
// 全域資料
// ─────────────────────────────────────────────
let PRICES = [];

const modelSelect  = document.getElementById('modelSelect');
const repairSelect = document.getElementById('repairSelect');
const resultArea   = document.getElementById('resultArea');

// ─────────────────────────────────────────────
// CSV 解析：一列 = 一機型，欄位 A~E
// A: 機型, B: 原廠電池, C: 副廠電池, D: 原廠螢幕, E: 副廠螢幕
// ─────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split('\n').slice(1); // 跳過標頭
  const items = [];
  const COLS = ['原廠電池', '副廠電池', '原廠螢幕', '副廠螢幕'];

  lines.forEach(line => {
    const cols = line.split(',').map(c => c.trim().replace(/^"|"$/g, ''));
    const model = cols[0];
    if (!model) return;

    COLS.forEach((repair, i) => {
      const retail = parseInt(cols[i + 1]);
      if (!retail || isNaN(retail)) return;
      const d = DISCOUNT[repair];
      items.push({
        model,
        repair,
        retail,
        member: Math.round(retail * d.member),
        trade:  Math.round(retail * d.trade),
      });
    });
  });
  return items;
}

// ─────────────────────────────────────────────
// 載入資料
// ─────────────────────────────────────────────
function showLoading() {
  resultArea.innerHTML = `
  <div class="empty-state">
    <div class="empty-icon" style="font-size:28px;opacity:0.6;">⏳</div>
    <div style="font-size:14px;font-weight:500;">載入報價資料中⋯</div>
  </div>`;
}

function showError() {
  resultArea.innerHTML = `
  <div class="empty-state">
    <div class="empty-icon" style="font-size:28px;opacity:0.6;">⚠️</div>
    <div style="font-size:14px;font-weight:500;">資料載入失敗</div>
    <div style="font-size:12px;margin-top:6px;">請確認試算表已公開發布</div>
  </div>`;
}

// 備用假資料（本機測試 / CORS 被擋時使用）
const FALLBACK_CSV = `機型,原廠電池,副廠電池,原廠螢幕,副廠螢幕
iPhone 7,800,500,1800,900
iPhone 7 Plus,900,550,2200,1100
iPhone 8,850,520,2000,1000
iPhone 8 Plus,950,600,2500,1300
iPhone X,1000,650,3200,1600
iPhone XS,1100,700,3800,1900
iPhone XS Max,1200,750,4500,2200
iPhone XR,1000,650,2800,1400
iPhone 11,1100,700,3000,1500
iPhone 11 Pro,1200,780,4200,2100
iPhone 11 Pro Max,1300,820,5000,2500
iPhone 12,1300,820,3500,1800
iPhone 12 mini,1200,780,3200,1600
iPhone 12 Pro,1400,880,4500,2200
iPhone 12 Pro Max,1500,950,5500,2800
iPhone 13,1400,880,3800,1900
iPhone 13 mini,1300,820,3500,1800
iPhone 13 Pro,1600,1000,5000,2500
iPhone 13 Pro Max,1700,1050,6000,3000
iPhone 14,1600,1000,4200,2100
iPhone 14 Plus,1700,1050,5000,2500
iPhone 14 Pro,1800,1150,6500,3200
iPhone 14 Pro Max,1900,1200,7800,3900
iPhone 15,1600,1100,4800,2800
iPhone 15 Plus,1600,1100,5500,3200
iPhone 15 Pro,1800,1300,7500,4800
iPhone 15 Pro Max,1800,1300,8800,5800
iPhone 16,1800,1200,5500,3200
iPhone 16 Plus,1800,1200,6200,3500
iPhone 16 Pro,2000,1400,8500,5500
iPhone 16 Pro Max,2000,1400,9800,6500
iPhone 17,2000,1300,6000,3500
iPhone 17 Air,2000,1300,6800,4000
iPhone 17 Pro,2200,1500,10000,6000
iPhone 17 Pro Max,2200,1500,11500,7000
iPhone SE 2,800,500,2000,1000
iPhone SE 3,900,580,2200,1100
iPhone 16E,1600,1050,4500,2600
iPhone 17E,1800,1150,5000,2900`;

async function loadData() {
  showLoading();
  try {
    const res = await fetch(CSV_URL);
    if (!res.ok) throw new Error('fetch failed');
    const text = await res.text();
    PRICES = parseCSV(text);
    populateModels();
    showEmpty();
  } catch (e) {
    console.warn('CSV fetch 失敗，使用備用資料:', e.message);
    PRICES = parseCSV(FALLBACK_CSV);
    populateModels();
    showEmpty();
    const banner = document.createElement('div');
    banner.style.cssText = 'background:rgba(255,140,66,0.12);border:1px solid rgba(255,140,66,0.3);border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:12px;color:#ff8c42;line-height:1.5;';
    banner.innerHTML = '⚠️ 無法連線至試算表，目前顯示暫存資料。<br>請將此檔案放至伺服器後即可自動讀取最新報價。';
    const resultArea = document.getElementById('resultArea');
    resultArea.parentNode.insertBefore(banner, resultArea);
  }
}

// ─────────────────────────────────────────────
// 選單
// ─────────────────────────────────────────────
function populateModels() {
  modelSelect.innerHTML = '<option value="">── 請選擇機型 ──</option>';
  const models = [...new Set(PRICES.map(p => p.model))];
  models.forEach(m => {
    const opt = document.createElement('option');
    opt.value = m; opt.textContent = m;
    modelSelect.appendChild(opt);
  });
}

function populateRepairs(model) {
  repairSelect.innerHTML = '';
  if (!model) {
    repairSelect.innerHTML = '<option value="">── 請先選擇機型 ──</option>';
    return;
  }
  const MENU = [
    { value: '',        label: '── 請選擇維修項目 ──' },
    { value: '__all__', label: '📋  全部項目一覽' },
    { value: '原廠電池', label: '🔋  原廠電池' },
    { value: '副廠電池', label: '🔋  副廠電池' },
    { value: '原廠螢幕', label: '📱  原廠螢幕' },
    { value: '副廠螢幕', label: '📱  副廠螢幕' },
  ];
  MENU.forEach(({ value, label }) => {
    const opt = document.createElement('option');
    opt.value = value; opt.textContent = label;
    repairSelect.appendChild(opt);
  });
}

// ─────────────────────────────────────────────
// 渲染
// ─────────────────────────────────────────────
function fmt(n) {
  return 'NT$ ' + n.toLocaleString('zh-TW');
}

function renderSingle(item) {
  return `
  <div style="margin-bottom:8px;">
    <span class="section-title">查詢結果</span>
  </div>
  <div class="result-card">
    <div class="card-header">
      <span class="repair-name">${item.repair}</span>
      <span class="model-badge">${item.model}</span>
    </div>
    <div class="price-grid">
      <div class="price-cell">
        <div class="price-type">原 價</div>
        <div class="price-value retail">${fmt(item.retail)}</div>
      </div>
      <div class="price-cell">
        <div class="price-type">會員價</div>
        <div class="price-value member">${fmt(item.member)}</div>
      </div>
      <div class="price-cell trade-cell">
        <div class="price-type" style="color:var(--accent);">同行價</div>
        <div class="price-value trade">${fmt(item.trade)}</div>
      </div>
    </div>
  </div>`;
}

function renderAll(model, items) {
  const rows = items.map(item => `
    <tr>
      <td style="font-weight:500;color:var(--text-1);">${item.repair}</td>
      <td class="col-retail">${fmt(item.retail)}</td>
      <td class="col-member">${fmt(item.member)}</td>
      <td class="col-trade">${fmt(item.trade)}</td>
    </tr>`).join('');

  return `
  <div style="margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;">
    <span class="section-title">全部項目</span>
    <span class="model-badge" style="font-size:11px;">${model} · ${items.length} 項</span>
  </div>
  <div class="result-card" style="overflow-x:auto;">
    <table class="result-table">
      <thead>
        <tr>
          <th>維修項目</th>
          <th>原價</th>
          <th>會員</th>
          <th style="color:var(--accent);">同行</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

function showEmpty() {
  resultArea.innerHTML = `
  <div class="empty-state">
    <div class="empty-icon">🔧</div>
    <div style="font-size:14px;font-weight:500;">請選擇機型與維修項目</div>
    <div style="font-size:12px;margin-top:6px;">將顯示詳細報價資訊</div>
  </div>`;
}

function onSelectionChange() {
  const model  = modelSelect.value;
  const repair = repairSelect.value;

  if (document.activeElement === modelSelect) {
    populateRepairs(model);
    showEmpty();
    return;
  }

  if (!model || !repair) { showEmpty(); return; }

  if (repair === '__all__') {
    const items = PRICES.filter(p => p.model === model);
    resultArea.innerHTML = renderAll(model, items);
    return;
  }

  const item = PRICES.find(p => p.model === model && p.repair === repair);
  if (item) {
    resultArea.innerHTML = renderSingle(item);
  } else {
    showEmpty();
  }
}

modelSelect.addEventListener('change', () => {
  populateRepairs(modelSelect.value);
  showEmpty();
});

// 啟動：先載入資料
loadData();
</script>
</body>
</html>
